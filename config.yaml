# =============================================================================
# Goodput-Evaluation Runtime for Early-Exit ViT (ViT-B/16 + LPH, 2-stage batching)
# Target HW: single NVIDIA RTX 5090, ONNX Runtime CUDA Execution Provider.
# All knobs live here. Paths marked (FILL IN) must be set for your server.
# =============================================================================

data:
  # Path to ImageNet val on the server (ImageFolder layout: val/<class>/*.JPEG)
  imagenet_val_dir: "/home2/imagenet/val"      # (FILL IN if different)
  num_requests: 16384                            # N requests drawn from val
  image_size: 224
  # timm standard preprocessing (vit_base_patch16_224): resize 256 -> center-crop 224
  resize: 256
  crop: 224
  mean: [0.5, 0.5, 0.5]                         # timm ViT default (inception-style)
  std:  [0.5, 0.5, 0.5]
  interpolation: "bicubic"

model:
  best_ckpt_path: "checkpoints/best.pth"        # trained EE-ViT-B/16 LPH checkpoint
  num_classes: 1000
  hidden_dim: 768
  exit_after_block: 6                            # LPH attached after 6th encoder block
  timm_model: "vit_base_patch16_224"            # used by `plain` (ImageNet pretrained)

early_exit:
  confidence_threshold: 0.7                      # max-softmax >= threshold -> exit at seg1
                                                 # fixed across the SLO sweep

batching:
  seg1_batch: 16                                 # seg1 accumulation batch (all runtimes)
  seg2_batch: 16                                 # proposed seg2 flush size (single-run default)
  seg2_batch_sweep: [4, 8, 16, 32]            # plot 1: one curve per seg2 batch size
  # proposed seg2 flush mode:
  #   "fixed": queue >= seg2_batch -> flush exactly seg2_batch (static ONNX graph)
  #   "all"  : queue >= seg2_batch -> flush the ENTIRE queue (dynamic ONNX graph,
  #            like naive; seg2 timed per flush since size varies)
  seg2_flush_mode: "fixed"

arrivals:
  # Arrival rate (req/s) for all single-λ plots (goodput/KDE/CDF/timeline).
  #   0   -> NO Poisson modeling: all requests queued at t=0 (saturated backlog)
  #   > 0 -> Poisson trace at this rate
  # Scalar = shared by all runtimes. OR a per-runtime mapping, e.g. each
  # runtime's sustainable upper bound read off the load-vs-latency plot:
  #   lambda:
  #     plain: 1400
  #     naive: 1650
  #     proposed: 1700
  # The λ-sweep plots (load vs latency, breakdown) always use lambda_sweep below.
  lambda: 
    plain: 1300
    naive: 1370
    proposed: 1515
  # Load plot sweep (requests/sec). Adjust to your GPU's throughput.
  lambda_sweep:
    start: 500.0
    stop: 2000.0
    step: 5.0
  seed: 1234                                     # fixes arrival trace + request sampling

slo:
  # Latency SLO sweep for goodput plot (milliseconds)
  start_ms: 0
  stop_ms: 100
  step_ms: 1

metrics:
  # Goodput definition:
  #   "wallclock"       : (# good samples) / (wall-clock span)          [spec §6, default]
  #   "mean_throughput" : (1/N) * sum over good samples of (1/latency)
  goodput_mode: "wallclock"

runtime:
  warmup_iters: 20                               # CUDA warmup runs per graph (excluded from timing)
  measure_iters: 1                               # measured repeats per (segment,batch) service-time probe
  providers: ["CUDAExecutionProvider", "CPUExecutionProvider"]
  # ORT session options
  graph_optimization_level: "ORT_ENABLE_ALL"
  intra_op_num_threads: 0                        # 0 = ORT default
  # Cache measured (segment,batch)->service_time to avoid re-timing static graphs.
  # naive seg2 is ALWAYS measured per-batch (dynamic count) regardless of this flag.
  cache_static_service_times: true

paths:
  onnx_dir: "artifacts/onnx"                     # exported + cached ONNX graphs
  plots_dir: "artifacts/plots"                   # output figures
  results_dir: "artifacts/results"               # raw per-sample records (npz/json)
  # Writable HuggingFace/timm cache (avoids Permission denied on shared caches).
  # Leave as-is unless you already have a writable HF_HOME you prefer.
  hf_cache: "artifacts/hf_cache"

plots:
  dpi: 300                                       # PNG raster dpi (PDF is vector)
  format: "png"
  # Timeline plot (plot7): clip the x-axis to the first N ms (null = full run).
  timeline_xlim_ms: null
  # Plot 1 pair figures (SLO vs Goodput): one λ per comparison, applied to
  # BOTH runtimes in that figure (identical arrival trace). 0 = saturated.
  slo_goodput_lambda:
    plain: 1600                                  # plot1a: Plain vs Proposed
    naive: 1690                                  # plot1b: Naive vs Proposed
  # Latency KDE (plot2/plot2b): bandwidth as a fraction of the data std
  # (scipy bw_method). Larger = smoother, smaller = spikier; null = Scott rule.
  kde_bandwidth: 0.3
  kde_grid_points: 400                           # x-resolution of the KDE curve
  # KDE x-axis upper bound — lower these when a long tail (e.g. proposed at
  # b2=32) squeezes the bulk of the distribution to the left:
  #   kde_xlim_ms: fixed cutoff in ms (takes precedence; null = disabled)
  #   kde_clip_percentile: percentile of plotted latencies (99.5 = old behavior)
  # If clipped, state "tail truncated at X ms" in the figure caption.
  kde_xlim_ms: null
  kde_clip_percentile: 99
